worker_processes 1;
error_log logs/error.log info;
pid /infocodes/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    #log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    #                 '$status $body_bytes_sent "$http_referer" '
    #                 '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    proxy_cache_path /infocodes/var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # Upstream para FastAPI backend
    upstream fastapi_backend {
        server localhost:8000;
    }

    # Upstream para Dashboard de Gestión de Problemas (Next.js, gestionado con pm2)
    upstream gestion_problemas_backend {
        server localhost:3001;
    }

    server {
        listen 8081 default_server;
        server_name 10.132.68.85 infocodes.si.orange.es;
        access_log /infocodes/var/log/nginx/infocodes.access.log;

        location /static {
            alias /infocodes/project/dashboardsonar-application-python/infocodest/static;
        }

        location /dashboards {
            alias /infocodes/project/release-dashboard-application/dashboards;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /reportes-incidencias {
            alias /infocodes/project/cso-incident-masivas-report/app;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Dashboard de Gestión de Problemas (Next.js con basePath=/problemas,
        # arrancado con pm2 en el puerto 3001). Sin barra final en proxy_pass:
        # nginx reenvía la URI completa (incluido /problemas) tal cual, que es
        # lo que Next.js espera al tener basePath configurado.
        location /problemas {
            proxy_pass http://gestion_problemas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API backend - FastAPI
        location /api {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts para uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            include proxy_params;
            proxy_pass http://unix:/infocodes/var/run/infocodes.sock;
            proxy_cache my_cache;
        }

        location /data {
            alias /infocodes/project/release-dashboard-application/data;
            autoindex off;
        }
    }

    # HTTPS server
    #
    #server {
    #    listen 443 ssl;
    #    server_name localhost;

    #    ssl_certificate cert.pem;
    #    ssl_certificate_key cert.key;

    #    ssl_session_cache shared:SSL:1m;
    #    ssl_session_timeout 5m;

    #    ssl_ciphers HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers on;

    #    location / {
    #        root html;
    #        index index.html index.htm;
    #    }
    #}
}
